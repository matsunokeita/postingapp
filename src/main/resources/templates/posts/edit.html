<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>投稿編集</title>
</head>

<body>
	<div class="wrapper">
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container">
				<h1 class="fs-2 my-3">投稿編集</h1>

				<div th:if="${errorMessage}">
					<p class="text-danger" th:text="${errorMessage}"></p>
				</div>

				<div class="mb-2">
					<a th:href="@{/posts}" class="text-decoration-none">&lt; 戻る</a>
				</div>

				<form th:action="@{/posts/__${post.id}__/update}" method="post" th:object="${postEditForm}"
					enctype="multipart/form-data">
					<div class="form-group mb-3">
						<label for="title">タイトル</label>
						<div th:if="${#fields.hasErrors('title')}" class="text-danger small mb-2" th:errors="*{title}">
						</div>
						<input type="text" class="form-control" th:field="*{title}">
					</div>

					<div class="form-group mb-3">
						<label for="content">本文</label>
						<div th:if="${#fields.hasErrors('content')}" class="text-danger small mb-2"
							th:errors="*{content}">
						</div>
						<textarea class="form-control" th:field="*{content}"></textarea>
					</div>

					<!-- 現在の添付ファイル表示 -->
					<div th:if="${post.fileUrl != null}" class="mb-3">
						<p class="fw-bold mb-1">現在の添付ファイル：</p>

						<!-- 画像の場合はプレビュー -->
						<div th:if="${post.fileName != null and (
							#strings.endsWith(#strings.toLowerCase(post.fileName), '.jpg') or
							#strings.endsWith(#strings.toLowerCase(post.fileName), '.jpeg') or
							#strings.endsWith(#strings.toLowerCase(post.fileName), '.png') or
							#strings.endsWith(#strings.toLowerCase(post.fileName), '.gif') or
							#strings.endsWith(#strings.toLowerCase(post.fileName), '.webp')
						)}">
							<img th:src="${post.fileUrl}" class="img-fluid mb-2"
								style="max-height: 200px;" th:alt="${post.fileName}">
						</div>

						<a th:href="${post.fileUrl}" th:text="${post.fileName}"
							target="_blank" class="btn btn-outline-secondary btn-sm mb-2"
							th:download="${post.fileName}">
						</a>
					</div>

					<div class="form-group mb-3">
						<label for="attachedFile">ファイルを変更する（任意）</label>
						<p class="text-muted small mb-1">新しいファイルを選択すると上書きされます。画像・PDF・Word・Excel・PowerPoint等（最大10MB）</p>
						<input type="file" class="form-control" th:field="*{attachedFile}">
					</div>

					<div>
						<button type="submit" class="btn btn-outline-primary">更新</button>
					</div>
				</form>
			</div>
		</main>

		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
